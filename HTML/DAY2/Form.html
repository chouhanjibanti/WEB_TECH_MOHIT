<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="" autocomplete="on">
        <label for="">FirstName :</label>
        <input type="text" placeholder="Enter your firstname"> <br>
        Email : <input type="email" autofocus> <br>
        Password : <input type="password" minlength="8" maxlength="10"> <br>

        <label for="gen">Gender</label>
        <input type="radio" name="gen">Male
        <input type="radio" name="gen">Female
        <input type="radio" name="gen">Other <br>


        <label for="hob">Hobbies</label>
         <input type="checkbox" name="hob">Singing
        <input type="checkbox" name="hob">Playing
        <input type="checkbox" name="hob">Swimming <br>

        Range : <input type="range"> <br>

        DOB - <input type="date"> <br>
        DOB - <input type="datetime"> <br>
        DOM - <input type="datetime-local"> <br>

        <button type="button">Submit</button> <br>
        <button type="reset">Reset</button> <br>
    </form>
</body>
</html>
